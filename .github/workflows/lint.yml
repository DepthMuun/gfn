name: Lint

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]
        
    - name: Run Black
      run: black --check gfn tests
      
    - name: Run Isort
      run: isort --check gfn tests
      
    - name: Run Flake8
      run: flake8 gfn tests
      
    - name: Run Mypy
      run: mypy gfn
