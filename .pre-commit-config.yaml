# Pre-commit hooks configuration for GFN (Minimal Stable Version)
# Install hooks with: pre-commit install

repos:
  # Format Python code with Black
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.10
        args: [--line-length, "120", --target-version, "py310"]

  # Sort Python imports with isort
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--line-length, "120", --profile, "black"]

  # Check Python code for common mistakes with flake8
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: [
          "--max-line-length=120",
          "--extend-ignore=E203,E501,W503",
          "--per-file-ignores=__init__.py:F401",
          "gfn/",
          "tests/"
        ]

  # Type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies: [torch, numpy, types-PyYAML]
        args: [
          "--ignore-missing-imports",
          "--strict-optional",
          "--no-implicit-optional",
          "--disallow-untyped-defs",
          "--disallow-incomplete-defs",
          "--check-untyped-defs",
          "--warn-return-any",
          "--warn-unused-ignores",
          "gfn/"
        ]

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: [--unsafe]
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: debug-statements

# Require all files to pass before committing
fail_fast: false
